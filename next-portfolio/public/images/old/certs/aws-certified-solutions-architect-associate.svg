<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="AWS Certified Solutions Architect - Associate badge">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="0.55" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0b1220" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Hex badge -->
  <g filter="url(#shadow)">
    <path
      d="M128 14
         L219 66
         L219 190
         L128 242
         L37 190
         L37 66 Z"
      fill="url(#bg)"
      stroke="url(#stroke)"
      stroke-width="6"
      stroke-linejoin="round"
    />
    <path
      d="M128 30
         L206 74
         L206 182
         L128 226
         L50 182
         L50 74 Z"
      fill="none"
      stroke="#0ea5e9"
      stroke-opacity="0.35"
      stroke-width="4"
      stroke-linejoin="round"
    />
  </g>

  <!-- Header -->
  <text x="88" y="70" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#ffffff">aws</text>
  <text x="88" y="92" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#ffffff" opacity="0.95">certified</text>
  <circle cx="155" cy="74" r="10" fill="#f59e0b"/>
  <path d="M151 74 l4 4 l8 -10" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="128" y="138" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800" fill="#ffffff">Solutions</text>
  <text x="128" y="168" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800" fill="#ffffff">Architect</text>

  <!-- Associate pill -->
  <rect x="62" y="184" width="132" height="30" rx="8" fill="#1e40af" stroke="#93c5fd" stroke-opacity="0.7"/>
  <text x="128" y="205" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800" fill="#ffffff" letter-spacing="2">ASSOCIATE</text>
</svg>
